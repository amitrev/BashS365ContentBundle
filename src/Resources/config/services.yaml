services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    s365_content.http_client.base:
        class: Symfony\Component\HttpClient\ScopingHttpClient
        factory: ['Symfony\Component\HttpClient\ScopingHttpClient', 'forBaseUri']
        autoconfigure: false
        arguments:
            $client: '@http_client'
            $baseUri: '%env(S365_CONTENT_API_URL)%'
            $defaultOptions:
                timeout: 10

    s365_content.http_client.retry_strategy:
        class: Symfony\Component\HttpClient\Retry\GenericRetryStrategy
        autoconfigure: false
        arguments:
            $statusCodes: [429, 500, 502, 503, 504]
            $delayMs: 1000
            $multiplier: 2.0
            $jitter: 0.1

    s365_content.http_client:
        class: Symfony\Component\HttpClient\RetryableHttpClient
        autoconfigure: false
        arguments:
            $client: '@s365_content.http_client.base'
            $strategy: '@s365_content.http_client.retry_strategy'
            $maxRetries: 3

    Bash\S365ContentBundle\Domain\HttpClient\ContentClientInterface:
        alias: Bash\S365ContentBundle\Infrastructure\HttpClient\ContentClient

    Bash\S365ContentBundle\Infrastructure\HttpClient\ContentClient:
        arguments:
            $httpClient: '@s365_content.http_client'
        tags:
            - { name: monolog.logger, channel: s365_content }

    Bash\S365ContentBundle\Infrastructure\HttpClient\ContentAuthenticator:
        arguments:
            $httpClient: '@s365_content.http_client'
            $cache: '@cache.app'

    Bash\S365ContentBundle\Infrastructure\Symfony\Controller\:
        resource: '../../Infrastructure/Symfony/Controller/'
        public: true
        tags: ['controller.service_arguments']
